topic_title: "AI search and edge intelligence trends: synthetic corpus research draft"
ov_root_uri: "viking://resources/synthetic-ai-news"

sections:
  - id: market
    heading: "AI search market direction"
    question: |
      Search the synthetic corpus for evidence about AI search products moving from generic Q&A toward task-oriented research workflows. Explain what public web search, local corpus search, and enterprise workflows each solve.
  - id: edge
    heading: "Edge LLMs and local retrieval"
    question: |
      Search for the advantages and limits of edge LLM devices, and explain why local corpus retrieval can complement edge AI.
  - id: agent_workflow
    heading: "Agent workflows and traceable citations"
    question: |
      Search for why agent browsers and automated research workflows need to preserve search steps, URI citations, and intermediate outputs.
  - id: governance
    heading: "Data governance and open-source safety"
    question: |
      Search for the privacy, API key, workspace, demo corpus, and open-source publishing boundaries that a local retrieval project should respect.
  - id: roadmap
    heading: "Product roadmap and future integration"
    question: |
      Search for why the product roadmap should first stabilize reliable retrieval and the research workflow before adding OpenVikingBot, MCP, or AnySearch wrappers.
